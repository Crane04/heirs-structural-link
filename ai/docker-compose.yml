version: "3.9"

services:
  ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heirs-ai
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - MODEL_PATH=best.pt
      - LOOKUP_PATH=lookup.json
      - PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
