[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.setup]
nixPkgs = ["glib"]
aptPkgs = ["libgl1", "libglib2.0-0"]

[phases.install]
cmds = [
  "python3 -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = "sh -lc '. /opt/venv/bin/activate && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'"